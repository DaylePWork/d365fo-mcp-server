name: Deploy to Azure

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: d365fo-mcp-server  # Replace with your app name
  NODE_VERSION: '24.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build TypeScript
        run: npm run build

      - name: Prepare deployment files
        run: |
          # Remove dev dependencies to reduce package size
          npm prune --production

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r dist node_modules package.json package-lock.json startup.sh deploy/
          cp .env.example deploy/.env.example
          cd deploy
          zip -r ../deployment.zip .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: deployment-package
          path: deployment.zip
          retention-days: 30
